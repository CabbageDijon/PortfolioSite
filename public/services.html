<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CabsCode, a Botswana based programmer who also offers web development and hosting services for Botswana businesses and individuals"
    />
    <title>CabsCode | Services</title>
    <link rel="icon" href="images/favicon.png" />
    <link rel="stylesheet" href="styles.css?v=1.0" />
  </head>
  <body>
    <nav>
      <div class="nav-left">
        <a href="/" class="logo" aria-label="Home">
          <div class="logo">
            <svg
              width="48"
              height="48"
              viewBox="0 0 32 32"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect
                width="32"
                height="32"
                rx="8"
                fill="#FFFFFF"
                stroke="#E3E8E1"
                stroke-width="1"
              ></rect>
              <!-- Outer Leaf/Bracket -->
              <path
                d="M14 8L6 16L14 24"
                stroke="#A9BBA2"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
                opacity="0.5"
              ></path>
              <!-- Inner Leaf/Bracket -->
              <path
                d="M18 10L12 16L18 22"
                stroke="#A9BBA2"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
              <!-- Closing Bracket -->
              <path
                d="M22 12L26 16L22 20"
                stroke="#1E2522"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg></div
        ></a>
      </div>

      <button class="mobile-toggle" aria-label="Toggle navigation">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <div class="nav-right">
        <a href="/" class="nav-link">Home</a>
        <a href="#" class="nav-link active">Services</a>
        <a href="/studio" class="nav-link">Studio</a>
        <a href="/journal" class="nav-link">Journal</a>
        <a href="#contactForm" class="contact-btn">Contact</a>
      </div>
    </nav>

    <main></main>

    <footer>
      <div class="footer-container">
        <div class="footer-col">
          <h4>Connect</h4>
          <a href="#">LinkedIn</a>
          <a href="#">GitHub</a>
          <a href="mailto:bowntema@gmail.com">Gmail</a>
        </div>

        <div class="footer-col">
          <h4>Legal</h4>
          <a href="#">Terms of Use</a>
          <a href="#">Privacy Policy</a>
        </div>

        <div class="footer-col footer-form">
          <h4>Project Inquiry</h4>
          <form action="#" method="POST" id="contactForm">
            <input type="email" placeholder="Your Email" required />
            <textarea
              placeholder="Tell me about your project..."
              rows="3"
              required
            ></textarea>
            <button type="submit" class="contact-btn">Send Request</button>
          </form>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Tema Bown. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js?v=1.0"></script>
  </body>
</html>
