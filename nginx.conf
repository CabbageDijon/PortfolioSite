server {
    listen 80;
    server_name _;

    # Define the root directory where your files live
    root /usr/share/nginx/html;
    index index.html;

    # 🚀 OPTIMIZATION: Enable Gzip compression for faster text/code loading
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # CORE ROUTING: Handle extensionless .html files
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 🚀 OPTIMIZATION: Cache static assets (images, css, js) for 6 months
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # Custom error page routing
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}