server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 🚀 OPTIMIZATION: Enable Gzip compression for faster text/code loading
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # CORE ROUTING: Handle extensionless .html files
    location / {
        try_files $uri $uri/ $uri.html =404;
        # NEW: Forces the browser to ALWAYS fetch the freshest HTML
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 🚀 OPTIMIZATION: Cache static assets (images, css, js) for 6 months
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # 🚀 API: Proxy contact form requests to Node backend
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Custom error page routing
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}